# ─────────────────────────────────────────────────────────────────────────────
# TG PRO QUANTUM – Redis Staging Configuration
# Memory limit: 8 GB, RDB + AOF persistence, password auth
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes

# ── Authentication ───────────────────────────────────────────────────────────
requirepass CHANGE_ME_staging_redis_password

# ── Memory ───────────────────────────────────────────────────────────────────
maxmemory 8gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# ── Persistence: RDB snapshots ────────────────────────────────────────────────
save 3600 1
save 300  100
save 60   10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ── Persistence: AOF ─────────────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb
aof-use-rdb-preamble yes

# ── Slow log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 256

# ── Latency monitoring ───────────────────────────────────────────────────────
latency-monitor-threshold 100

# ── Connections ──────────────────────────────────────────────────────────────
maxclients 1000
tcp-keepalive 60
timeout 300

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Key notifications (for cache event monitoring) ───────────────────────────
notify-keyspace-events "Ex"
