# ─────────────────────────────────────────────────────────────────────────────
# TG PRO QUANTUM – Prometheus Staging Configuration
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: staging
    project: tg-pro-quantum

# ── Alert rules ───────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules.yml

# ── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape jobs ───────────────────────────────────────────────────────────────
scrape_configs:
  # FastAPI application metrics
  - job_name: tgpq_app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: api

  # PostgreSQL exporter
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: database

  # Redis exporter
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: cache

  # Nginx exporter
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: proxy

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Node exporter (host metrics)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host

  # Celery workers
  - job_name: celery
    static_configs:
      - targets: ["celery_worker:9540"]
        labels:
          service: worker
