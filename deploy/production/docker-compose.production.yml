version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# TG PRO QUANTUM – Production Environment
# Blue-Green deployment: set DEPLOY_COLOR=blue|green
# Start with:
#   docker compose --env-file .env.production \
#     -f docker-compose.production.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  SECRET_KEY: ${SECRET_KEY}
  DEBUG: "false"
  ALLOWED_HOSTS: ${ALLOWED_HOSTS}
  APP_ENV: production

x-app-healthcheck: &app-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  # ── PostgreSQL Primary ──────────────────────────────────────────────────────
  db-primary:
    image: postgres:16-alpine
    container_name: tgpq-prod-db-primary
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_quantum_prod}
      POSTGRES_USER: ${POSTGRES_USER:-tgpq_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    command: >
      postgres
      -c wal_level=replica
      -c hot_standby=on
      -c max_wal_senders=3
      -c max_replication_slots=3
      -c hot_standby_feedback=on
      -c log_min_duration_statement=1000
      -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_prod_primary:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgpq_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-net

  # ── PostgreSQL Replica ──────────────────────────────────────────────────────
  db-replica:
    image: postgres:16-alpine
    container_name: tgpq-prod-db-replica
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_quantum_prod}
      POSTGRES_USER: ${POSTGRES_USER:-tgpq_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_REPLICATION_USER:-replicator}
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      PGHOST: db-primary
    volumes:
      - postgres_prod_replica:/var/lib/postgresql/data
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgpq_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-net

  # ── Redis Node 1 ────────────────────────────────────────────────────────────
  redis-1:
    image: redis:7-alpine
    container_name: tgpq-prod-redis-1
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --protected-mode no
    volumes:
      - redis_prod_1:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-net

  # ── Redis Node 2 ────────────────────────────────────────────────────────────
  redis-2:
    image: redis:7-alpine
    container_name: tgpq-prod-redis-2
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --protected-mode no
      --replicaof redis-1 6379
      --masterauth ${REDIS_PASSWORD}
    volumes:
      - redis_prod_2:/data
    depends_on:
      redis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-net

  # ── Redis Node 3 ────────────────────────────────────────────────────────────
  redis-3:
    image: redis:7-alpine
    container_name: tgpq-prod-redis-3
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --protected-mode no
      --replicaof redis-1 6379
      --masterauth ${REDIS_PASSWORD}
    volumes:
      - redis_prod_3:/data
    depends_on:
      redis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-net

  # ── FastAPI Application (BLUE – replica 1) ──────────────────────────────────
  app-blue-1:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${BLUE_IMAGE_TAG:-latest}
    container_name: tgpq-prod-app-blue-1
    restart: always
    environment:
      <<: *common-env
      DEPLOY_COLOR: blue
      INSTANCE_ID: blue-1
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
      - app_data:/app/data
    expose:
      - "8000"
    healthcheck: *app-healthcheck
    networks:
      - prod-net
    profiles:
      - blue

  # ── FastAPI Application (BLUE – replica 2) ──────────────────────────────────
  app-blue-2:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${BLUE_IMAGE_TAG:-latest}
    container_name: tgpq-prod-app-blue-2
    restart: always
    environment:
      <<: *common-env
      DEPLOY_COLOR: blue
      INSTANCE_ID: blue-2
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
      - app_data:/app/data
    expose:
      - "8000"
    healthcheck: *app-healthcheck
    networks:
      - prod-net
    profiles:
      - blue

  # ── FastAPI Application (BLUE – replica 3) ──────────────────────────────────
  app-blue-3:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${BLUE_IMAGE_TAG:-latest}
    container_name: tgpq-prod-app-blue-3
    restart: always
    environment:
      <<: *common-env
      DEPLOY_COLOR: blue
      INSTANCE_ID: blue-3
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
      - app_data:/app/data
    expose:
      - "8000"
    healthcheck: *app-healthcheck
    networks:
      - prod-net
    profiles:
      - blue

  # ── FastAPI Application (GREEN – replica 1) ─────────────────────────────────
  app-green-1:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${GREEN_IMAGE_TAG:-green}
    container_name: tgpq-prod-app-green-1
    restart: always
    environment:
      <<: *common-env
      DEPLOY_COLOR: green
      INSTANCE_ID: green-1
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
      - app_data:/app/data
    expose:
      - "8000"
    healthcheck: *app-healthcheck
    networks:
      - prod-net
    profiles:
      - green

  # ── FastAPI Application (GREEN – replica 2) ─────────────────────────────────
  app-green-2:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${GREEN_IMAGE_TAG:-green}
    container_name: tgpq-prod-app-green-2
    restart: always
    environment:
      <<: *common-env
      DEPLOY_COLOR: green
      INSTANCE_ID: green-2
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
      - app_data:/app/data
    expose:
      - "8000"
    healthcheck: *app-healthcheck
    networks:
      - prod-net
    profiles:
      - green

  # ── FastAPI Application (GREEN – replica 3) ─────────────────────────────────
  app-green-3:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${GREEN_IMAGE_TAG:-green}
    container_name: tgpq-prod-app-green-3
    restart: always
    environment:
      <<: *common-env
      DEPLOY_COLOR: green
      INSTANCE_ID: green-3
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
      - app_data:/app/data
    expose:
      - "8000"
    healthcheck: *app-healthcheck
    networks:
      - prod-net
    profiles:
      - green

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${BLUE_IMAGE_TAG:-latest}
    container_name: tgpq-prod-worker
    restart: always
    command: celery -A tasks.broadcast_tasks.celery_app worker --loglevel=info --concurrency=8
    environment:
      <<: *common-env
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
      - app_data:/app/data
    networks:
      - prod-net

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: tgpq-app:${BLUE_IMAGE_TAG:-latest}
    container_name: tgpq-prod-beat
    restart: always
    command: celery -A tasks.scheduler_tasks.celery_app beat --loglevel=info
    environment:
      <<: *common-env
    env_file:
      - .env.production
    depends_on:
      db-primary:
        condition: service_healthy
      redis-1:
        condition: service_healthy
    networks:
      - prod-net

  # ── Nginx Load Balancer (active) ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tgpq-prod-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_prod_logs:/var/log/nginx
    depends_on:
      - app-blue-1
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prod-net

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tgpq-prod-prometheus
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    volumes:
      - ./prometheus-production.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules-production.yml:/etc/prometheus/rules.yml:ro
      - prometheus_prod_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - prod-net

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: tgpq-prod-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitoring.tg-pro-quantum.app
      GF_SERVER_DOMAIN: monitoring.tg-pro-quantum.app
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./grafana-production-dashboards.json:/etc/grafana/provisioning/dashboards/tgpq.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - prod-net

  # ── AlertManager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: tgpq-prod-alertmanager
    restart: always
    volumes:
      - ./alertmanager-production.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - prod-net

  # ── Elasticsearch Node 1 ────────────────────────────────────────────────────
  elasticsearch-1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: tgpq-prod-es-1
    restart: always
    environment:
      node.name: es-1
      cluster.name: tgpq-prod-cluster
      discovery.seed_hosts: elasticsearch-2,elasticsearch-3
      cluster.initial_master_nodes: es-1,es-2,es-3
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_prod_1:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTICSEARCH_PASSWORD} http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - prod-net

  # ── Elasticsearch Node 2 ────────────────────────────────────────────────────
  elasticsearch-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: tgpq-prod-es-2
    restart: always
    environment:
      node.name: es-2
      cluster.name: tgpq-prod-cluster
      discovery.seed_hosts: elasticsearch-1,elasticsearch-3
      cluster.initial_master_nodes: es-1,es-2,es-3
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_prod_2:/usr/share/elasticsearch/data
    networks:
      - prod-net

  # ── Elasticsearch Node 3 ────────────────────────────────────────────────────
  elasticsearch-3:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: tgpq-prod-es-3
    restart: always
    environment:
      node.name: es-3
      cluster.name: tgpq-prod-cluster
      discovery.seed_hosts: elasticsearch-1,elasticsearch-2
      cluster.initial_master_nodes: es-1,es-2,es-3
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_prod_3:/usr/share/elasticsearch/data
    networks:
      - prod-net

  # ── Kibana ──────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: tgpq-prod-kibana
    restart: always
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch-1:9200","http://elasticsearch-2:9200","http://elasticsearch-3:9200"]'
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      SERVER_NAME: logs.tg-pro-quantum.app
      SERVER_BASEPATH: ""
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch-1:
        condition: service_healthy
    networks:
      - prod-net

  # ── Filebeat ────────────────────────────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: tgpq-prod-filebeat
    restart: always
    user: root
    volumes:
      - ./filebeat-production.yml:/usr/share/filebeat/filebeat.yml:ro
      - app_logs:/app/logs:ro
      - nginx_prod_logs:/var/log/nginx:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch-1:
        condition: service_healthy
    networks:
      - prod-net

  # ── Postgres Exporter ────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: tgpq-prod-pg-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-primary:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      db-primary:
        condition: service_healthy
    networks:
      - prod-net

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: tgpq-prod-redis-exporter
    restart: always
    environment:
      REDIS_ADDR: redis://redis-1:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis-1:
        condition: service_healthy
    networks:
      - prod-net

  # ── Nginx Exporter ───────────────────────────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: tgpq-prod-nginx-exporter
    restart: always
    command:
      - -nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - nginx
    networks:
      - prod-net

  # ── Node Exporter ────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: tgpq-prod-node-exporter
    restart: always
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - prod-net

volumes:
  postgres_prod_primary:
  postgres_prod_replica:
  redis_prod_1:
  redis_prod_2:
  redis_prod_3:
  app_sessions:
  app_logs:
  app_data:
  nginx_prod_logs:
  prometheus_prod_data:
  grafana_prod_data:
  elasticsearch_prod_1:
  elasticsearch_prod_2:
  elasticsearch_prod_3:

networks:
  prod-net:
    driver: bridge
