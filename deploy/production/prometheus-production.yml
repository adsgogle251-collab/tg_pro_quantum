# ─────────────────────────────────────────────────────────────────────────────
# TG PRO QUANTUM – Prometheus Production Configuration
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    project: tg-pro-quantum

# ── Alert rules ───────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules.yml

# ── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape jobs ───────────────────────────────────────────────────────────────
scrape_configs:
  # FastAPI application metrics – BLUE
  - job_name: tgpq_app_blue
    metrics_path: /metrics
    static_configs:
      - targets:
          - "app-blue-1:8000"
          - "app-blue-2:8000"
          - "app-blue-3:8000"
        labels:
          service: api
          color: blue

  # FastAPI application metrics – GREEN
  - job_name: tgpq_app_green
    metrics_path: /metrics
    static_configs:
      - targets:
          - "app-green-1:8000"
          - "app-green-2:8000"
          - "app-green-3:8000"
        labels:
          service: api
          color: green

  # PostgreSQL exporter
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: database

  # Redis exporter
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: cache

  # Nginx exporter
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: proxy

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Node exporter (host metrics)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host

  # Celery workers
  - job_name: celery
    static_configs:
      - targets: ["celery-worker:9540"]
        labels:
          service: worker

  # AlertManager self-monitoring
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # Grafana health
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: monitoring
