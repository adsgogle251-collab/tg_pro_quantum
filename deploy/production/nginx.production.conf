# ─────────────────────────────────────────────────────────────────────────────
# TG PRO QUANTUM – Nginx Production Configuration
# Domain: tg-pro-quantum.app
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  10240;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    server_tokens off;

    # ── Buffers ───────────────────────────────────────────────────────────────
    client_body_buffer_size    128k;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 4k;
    output_buffers             1 32k;
    postpone_output            1460;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout    12;
    client_header_timeout  12;
    send_timeout           10;
    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:20m  rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status 429;

    # ── Upstream – Blue ───────────────────────────────────────────────────────
    upstream app_blue {
        least_conn;
        server app-blue-1:8000 max_fails=3 fail_timeout=30s;
        server app-blue-2:8000 max_fails=3 fail_timeout=30s;
        server app-blue-3:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── Upstream – Green ──────────────────────────────────────────────────────
    upstream app_green {
        least_conn;
        server app-green-1:8000 max_fails=3 fail_timeout=30s;
        server app-green-2:8000 max_fails=3 fail_timeout=30s;
        server app-green-3:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── Active backend (set via map) ──────────────────────────────────────────
    # Traffic weights are controlled by $deploy_backend variable.
    # During blue-green switch the nginx.conf is reloaded (nginx -s reload)
    # with an updated map block – zero downtime.
    map $uri $deploy_backend {
        default app_blue;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS API Server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.tg-pro-quantum.app;

        # ── SSL ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/production.crt;
        ssl_certificate_key /etc/nginx/ssl/production.key;
        ssl_protocols       TLSv1.3 TLSv1.2;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options              DENY always;
        add_header X-Content-Type-Options       nosniff always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;

        # ── CORS ──────────────────────────────────────────────────────────────
        set $cors_origin "";
        if ($http_origin ~* "^https://(app|monitoring|logs)\.tg-pro-quantum\.app$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID" always;
        add_header Access-Control-Max-Age       86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Nginx status (for exporter) ───────────────────────────────────────
        location = /nginx_status {
            stub_status on;
            access_log off;
            allow 172.0.0.0/8;
            deny all;
        }

        # ── Health check (no auth, no rate limit) ─────────────────────────────
        location = /health {
            proxy_pass         http://$deploy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            access_log off;
        }

        # ── Authentication endpoints (stricter rate limit) ────────────────────
        location ~ ^/api/v1/auth {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_conn conn_limit 20;

            proxy_pass         http://$deploy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws {
            proxy_pass         http://$deploy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── API v1 ────────────────────────────────────────────────────────────
        location /api/ {
            limit_req  zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 100;

            proxy_pass         http://$deploy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Request-ID       $request_id;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }

        # ── Docs ──────────────────────────────────────────────────────────────
        location /docs {
            proxy_pass         http://$deploy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /redoc {
            proxy_pass         http://$deploy_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Metrics (internal only) ───────────────────────────────────────────
        location /metrics {
            allow 172.0.0.0/8;
            deny  all;
            proxy_pass http://$deploy_backend;
        }
    }

    # ── Monitoring sub-domain ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name monitoring.tg-pro-quantum.app;

        ssl_certificate     /etc/nginx/ssl/production.crt;
        ssl_certificate_key /etc/nginx/ssl/production.key;
        ssl_protocols       TLSv1.3 TLSv1.2;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header X-Content-Type-Options    nosniff always;

        location / {
            proxy_pass         http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Logs sub-domain ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name logs.tg-pro-quantum.app;

        ssl_certificate     /etc/nginx/ssl/production.crt;
        ssl_certificate_key /etc/nginx/ssl/production.key;
        ssl_protocols       TLSv1.3 TLSv1.2;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header X-Content-Type-Options    nosniff always;

        location / {
            proxy_pass         http://kibana:5601;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
